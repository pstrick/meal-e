<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes - Meal-E</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script>
        (function () {
            const root = document.documentElement;
            root.classList.add('theme-preload');
            try {
                const raw = localStorage.getItem('meale-settings');
                const settings = raw ? JSON.parse(raw) : null;
                if (settings && typeof settings.theme !== 'string' && typeof settings.darkMode === 'boolean') {
                    settings.theme = settings.darkMode ? 'dark' : 'light';
                    try {
                        localStorage.setItem('meale-settings', JSON.stringify(settings));
                    } catch (storageError) {
                        console.warn('Unable to persist theme migration:', storageError);
                    }
                }
                const isDark = settings ? (settings.theme === 'dark' || settings.darkMode === true) : false;
                if (isDark) {
                    root.classList.add('dark-mode');
                    root.style.colorScheme = 'dark';
                    root.style.backgroundColor = '#121212';
                    if (!document.getElementById('dark-mode-preload')) {
                        const preloadStyle = document.createElement('style');
                        preloadStyle.id = 'dark-mode-preload';
                        preloadStyle.textContent = 'html, body { background-color: #121212 !important; color: #f1f1f1 !important; }';
                        (document.head || root).appendChild(preloadStyle);
                    }
                    const darkVars = {
                        '--color-bg': '#121212',
                        '--color-bg-muted': '#1e1e1e',
                        '--color-surface': '#1a1a1a',
                        '--color-surface-alt': '#232323',
                        '--color-surface-elevated': '#2b2b2b',
                        '--color-text': '#f1f1f1',
                        '--color-text-muted': '#a3a3a3',
                        '--color-text-subtle': '#d0d0d0',
                        '--color-border': 'rgba(255, 255, 255, 0.16)',
                        '--color-border-strong': 'rgba(255, 255, 255, 0.25)',
                        '--color-divider': 'rgba(255, 255, 255, 0.18)'
                    };
                    Object.keys(darkVars).forEach(function (key) {
                        root.style.setProperty(key, darkVars[key]);
                    });
                }
            } catch (error) {
                console.warn('Unable to apply stored theme preference early:', error);
            }
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="mealplan.html" class="logo">Meal-E</a>
                <div class="nav-links">
                    <a href="mealplan.html">Meal Plan</a>
                    <a href="meals.html">Meals</a>
                    <a href="recipes.html" class="active">Recipes</a>
                    <a href="ingredients.html">Ingredients</a>
                    <a href="shopping-lists.html">Lists</a>
                    <a href="settings.html">Settings</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Recipes</h1>

            <div class="card">
                <div class="card-header">
                    <h2>Recipes</h2>
                    <div class="card-header-actions">
                        <button id="add-recipe-btn" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Add Recipe
                        </button>
                    </div>
                </div>
                <div class="recipes-filters">
                    <div class="search-bar">
                        <input type="text" id="recipe-search" placeholder="Search recipes..." class="search-input">
                    </div>
                    <div class="filter-group">
                        <label for="category-filter">Category</label>
                        <select id="category-filter">
                            <option value="all">All categories</option>
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                            <option value="snacks">Snacks</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table id="recipes-table" class="recipes-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="name">Name <span class="sort-icon"></span></th>
                                <th class="sortable" data-sort="category">Category <span class="sort-icon"></span></th>
                                <th class="sortable" data-sort="servingSize">Serving Size <span class="sort-icon"></span></th>
                                <th class="sortable" data-sort="calories">Calories <span class="sort-icon"></span></th>
                                <th>Macros</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recipe-list">
                            <!-- Recipe rows populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Custom Recipe</h2>
            <form id="recipe-form">
                <div class="form-group">
                    <label for="recipe-name">Recipe Name</label>
                    <input type="text" id="recipe-name" required>
                </div>
                
                <div class="form-group">
                    <label for="recipe-category">Category</label>
                    <select id="recipe-category" required>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snacks">Snacks</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="recipe-serving-size">Serving Size (g)</label>
                    <input type="number" id="recipe-serving-size" step="1" min="0" required>
                </div>
                
                <div id="ingredients-list">
                    <!-- Ingredient inputs will be added here -->
                </div>
                
                <button type="button" id="add-ingredient-btn" class="btn btn-secondary">
                    <i class="fas fa-plus"></i> Add Ingredient
                </button>
                
                <div id="recipe-totals" class="recipe-totals-section">
                    <h3>Recipe Totals (Per Serving)</h3>
                    <div class="nutrition-totals">
                        <div class="nutrition-item">
                            <span class="nutrition-label">Calories</span>
                            <span class="nutrition-value" id="recipe-total-calories">0</span>
                        </div>
                        <div class="nutrition-item">
                            <span class="nutrition-label">Protein</span>
                            <span class="nutrition-value" id="recipe-total-protein">0g</span>
                        </div>
                        <div class="nutrition-item">
                            <span class="nutrition-label">Carbs</span>
                            <span class="nutrition-value" id="recipe-total-carbs">0g</span>
                        </div>
                        <div class="nutrition-item">
                            <span class="nutrition-label">Fat</span>
                            <span class="nutrition-value" id="recipe-total-fat">0g</span>
                        </div>
                        <div class="nutrition-item">
                            <span class="nutrition-label">Total Cost</span>
                            <span class="nutrition-value" id="recipe-total-cost">$0.00</span>
                        </div>
                        <div class="nutrition-item">
                            <span class="nutrition-label">Cost Per Serving</span>
                            <span class="nutrition-value" id="recipe-cost-per-serving">$0.00</span>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="recipe-steps">Recipe Instructions</label>
                    <textarea id="recipe-steps" rows="6" placeholder="Enter step-by-step cooking instructions..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-recipe">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Recipe</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js" type="module"></script>
    <script src="js/footer.js" type="module"></script>

    <!-- Ingredient Search Modal -->
    <div id="ingredient-search-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Search Ingredients</h2>
            <div class="search-container">
                <input type="text" id="ingredient-search-input" placeholder="Search my ingredients...">
                <button id="search-btn" class="btn btn-primary">Search</button>
            </div>
            <div id="search-results" class="search-results">
                <!-- Search results will be added here -->
            </div>
        </div>
    </div>
</body>
</html>
