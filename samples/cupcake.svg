    <ellipse cx="120" cy="136" rx="48.5" ry="7.8" fill="url(#wrapperTopRim)" opacity="0.88"/>

    <path d="M86 138v44M98 138v44M110 138v44M122 138v44M134 138v44M146 138v44"
      fill="none"
