    <ellipse cx="142" cy="62" rx="10.2" ry="10" fill="url(#cherryFill)"/>
    <ellipse cx="138.8" cy="58.6" rx="3" ry="2" fill="#ffffff" opacity="0.70"/>
    <path d="M140 53c1-8.7 7-15 13.2-16.2" fill="none" stroke="#5d8a43" stroke-width="2.8" stroke-linecap="round"/>

    <ellipse cx="92" cy="98" rx="17" ry="7" fill="#fff5f9" opacity="0.56"/>
    <ellipse cx="121" cy="89" rx="13" ry="5.7" fill="#fff2f8" opacity="0.42"/>

    <path
