    <path
      d="M58 123c0-12 7-22 18-26 3-16 18-30 39-34 29-6 56 7 68 30 14 0 25 6 30 18 7 16 0 34-18 44-17 9-39 12-61 10-22-2-42-10-55-21-14-12-21-25-21-41z"
