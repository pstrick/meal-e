    />
    <path d="M72 136h97" fill="none" stroke="#456ba5" stroke-opacity="0.48" stroke-width="1.4"/>
    <path d="M169 136l12 8" fill="none" stroke="#2f4d83" stroke-opacity="0.6" stroke-width="1.2"/>
