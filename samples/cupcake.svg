<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <radialGradient id="frostingBase" cx="34%" cy="24%" r="82%">
      <stop offset="0" stop-color="#f8dde9"/>
      <stop offset="0.42" stop-color="#eeb7cd"/>
      <stop offset="0.78" stop-color="#d290b0"/>
      <stop offset="1" stop-color="#b36d90"/>
    </radialGradient>
    <radialGradient id="frostingShadow" cx="67%" cy="82%" r="66%">
      <stop offset="0" stop-color="#8f4f70" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8f4f70" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wrapperFront" x1="0" y1="0" x2="0.12" y2="1">
      <stop offset="0" stop-color="#8eb8e6"/>
      <stop offset="0.5" stop-color="#5f87c5"/>
      <stop offset="1" stop-color="#3d5f9b"/>
    </linearGradient>
    <linearGradient id="wrapperSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f97d0"/>
      <stop offset="1" stop-color="#2f4d83"/>
    </linearGradient>
    <linearGradient id="wrapperTopRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#adc7e9"/>
      <stop offset="1" stop-color="#6f93c3"/>
    </linearGradient>
    <radialGradient id="cherryFill" cx="30%" cy="24%" r="72%">
      <stop offset="0" stop-color="#f37f8f"/>
      <stop offset="0.45" stop-color="#cc2f48"/>
      <stop offset="1" stop-color="#7d1022"/>
    </radialGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="180%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.4" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="frostingTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="monoNoise"/>
      <feComponentTransfer in="monoNoise" result="softNoise">
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
    <filter id="paperTexture" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="1" seed="11" result="paperNoise"/>
      <feColorMatrix in="paperNoise" type="saturate" values="0" result="monoPaper"/>
      <feComponentTransfer in="monoPaper" result="paperAlpha">
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="paperAlpha" mode="multiply"/>
    </filter>
  </defs>

  <ellipse cx="118" cy="195" rx="66" ry="11.5" fill="#000000" opacity="0.12"/>

  <g filter="url(#softShadow)">
